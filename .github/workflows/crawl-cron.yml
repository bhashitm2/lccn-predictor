name: Crawl & predict latest contest

# The crawler runs HERE (GitHub Actions), not on the web host: a runner's IP can
# reach LeetCode's Cloudflare-protected ranking API via curl_cffi, whereas many
# cloud hosts (e.g. Render) get 403'd. It writes predictions straight to MongoDB
# Atlas; the deployed API then serves those cached results.
#
# Required repository secret:
#   LCCN_MONGODB_URI   the same MongoDB Atlas connection string the web host uses
#
# Times are UTC. LeetCode weekly ends ~04:00 UTC Sun; biweekly ~16:00 UTC Sat.
# Re-runs are no-ops once the latest contest is already predicted.
on:
  schedule:
    - cron: "30 4 * * 0"    # Sunday after weekly
    - cron: "0 5 * * 0"     # retry / late ratings
    - cron: "30 16 * * 6"   # Saturday after biweekly
    - cron: "0 17 * * 6"    # retry
    # --- re-crawl AFTER LeetCode's cheater purge (these force a re-predict) ---
    - cron: "0 10 * * 0"    # weekly:   +6h
    - cron: "0 4 * * 1"     # weekly:   ~+24h (final, after ratings settle)
    - cron: "0 22 * * 6"    # biweekly: +6h
    - cron: "0 16 * * 0"    # biweekly: ~+24h (final)
  workflow_dispatch:
    inputs:
      slug:
        description: "Contest slug (blank = latest finished)"
        required: false
      limit:
        description: "Top-N only (blank = full contest)"
        required: false
      force:
        description: "Re-predict even if already done (true/false)"
        required: false
        default: "false"

concurrency:
  group: crawl-predict
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt
      - name: Crawl + predict
        env:
          LCCN_MONGODB_URI: ${{ secrets.LCCN_MONGODB_URI }}
          LCCN_DB_NAME: lccn_predictor
          # Gentler ranking crawl: a full ~1,500-page contest at high concurrency
          # gets throttled (403'd) by Cloudflare on the runner's IP, dropping pages.
          # Lower concurrency + more retries trades speed for completeness.
          LCCN_RANKING_CONCURRENCY: "4"
          LCCN_RATING_CONCURRENCY: "8"
          LCCN_HTTP_RETRY: "15"
          SLUG: ${{ github.event.inputs.slug }}
          LIMIT: ${{ github.event.inputs.limit }}
          FORCE: ${{ github.event.inputs.force }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          # late scheduled re-crawls force a re-predict (contest is already "done")
          case "$SCHEDULE" in
            "0 10 * * 0"|"0 4 * * 1"|"0 22 * * 6"|"0 16 * * 0") FORCE="true" ;;
          esac
          ARGS=""
          [ -n "$LIMIT" ] && ARGS="$ARGS --limit $LIMIT"
          [ "$FORCE" = "true" ] && ARGS="$ARGS --force"
          if [ -n "$SLUG" ]; then
            python -m predictor.cli predict "$SLUG" $ARGS
          else
            python -m predictor.cli predict-latest $ARGS
          fi
