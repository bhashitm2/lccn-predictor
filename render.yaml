# Render Blueprint — free-tier deployment of the predictor API.
# Docs: https://render.com/docs/blueprint-spec
#
# Steps:
#   1. Create a free MongoDB Atlas cluster (M0) and copy its connection string.
#   2. Push this repo to GitHub, then in Render: New > Blueprint > pick the repo.
#   3. Set the env vars marked `sync: false` in the Render dashboard
#      (LCCN_MONGODB_URI, LCCN_API_KEY, LCCN_CORS_ORIGINS).
#   4. Add the LCCN_MONGODB_URI GitHub Actions secret so the crawler workflow
#      (.github/workflows/crawl-cron.yml) can write predictions to Atlas.
#
# NOTE: this web service only SERVES cached predictions — it never crawls
# (LeetCode's Cloudflare 403s the ranking API from cloud-host IPs). The crawl
# runs in GitHub Actions and writes to the same Atlas DB. Render's free service
# spinning down when idle is therefore fine; reads wake it on demand.
services:
  - type: web
    name: lccn-predictor
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: LCCN_MONGODB_URI        # MongoDB Atlas connection string
        sync: false
      - key: LCCN_DB_NAME
        value: lccn_predictor
      - key: LCCN_API_KEY            # secret that gates crawl-triggering endpoints
        sync: false
      - key: LCCN_CORS_ORIGINS       # e.g. https://your-website.com
        sync: false
      - key: LCCN_PUBLIC_CRAWL_ENABLED
        value: "false"               # public reads serve cached only
      - key: LCCN_RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: LCCN_SCHEDULER_ENABLED
        value: "false"
      - key: LCCN_AUTO_PREDICT_ENABLED
        value: "false"               # free tier sleeps -> use the GH Actions cron
